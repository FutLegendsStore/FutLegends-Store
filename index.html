<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Legends Store</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
    <img src="IMG_4665.jpeg" alt="Fut Legends Store">
</div>

<h1>Fut Legends Store</h1>

        <p>Las mejores camisas de fútbol de Nicaragua</p>

        <a href="#catalogo" class="boton">
            Ver catálogo
        </a>
    </header>

    <main>

        <section id="catalogo" class="catalogo">

            <h2>Productos destacados</h2>

            <div class="productos">

                <div class="producto">

                    <img src="https://placehold.co/400x500?text=Real+Madrid" alt="Real Madrid">

                    <h3>Real Madrid 2026/27</h3>

                    <p class="precio">
                        US$40 | C$1,464
                    </p>

                    <a class="comprar"
                        href="https://wa.me/50557096303?text=Hola,%20quiero%20la%20camisa%20del%20Real%20Madrid">
                        Pedir por WhatsApp
                    </a>

                </div>

                <div class="producto">

                    <img src="https://placehold.co/400x500?text=Barcelona" alt="Barcelona">

                    <h3>Barcelona 2026/27</h3>

                    <p class="precio">
                        US$40 | C$1,464
                    </p>

                    <a class="comprar"
                        href="https://wa.me/50557096303?text=Hola,%20quiero%20la%20camisa%20del%20Barcelona">
                        Pedir por WhatsApp
                    </a>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
